version: "2"

sql:
  - engine: "postgresql"
    queries:
      - "./internal/adapters/postgresql/sqlc/queries.sql"
    schema: "./internal/adapters/postgresql/migrations"

    gen:
      go:
        package: "repo"
        out: "./internal/adapters/postgresql/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_pointers_for_null_types: true

        overrides:
          - db_type: "text"
            go_type: "string"

          - db_type: "varchar"
            go_type: "string"

          - db_type: "character varying"
            go_type: "string"
